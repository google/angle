buckets {
  name: "try"
  swarming {
    builders {
      name: "angle-cq-android-arm-dbg"
      swarming_host: "chromium-swarm.appspot.com"
      dimensions: "builderless:1"
      dimensions: "cores:8"
      dimensions: "os:Ubuntu-22.04"
      dimensions: "pool:luci.chromium.gpu.try"
      exe {
        cipd_package: "infra/recipe_bundles/chromium.googlesource.com/chromium/tools/build"
        cipd_version: "refs/heads/main"
        cmd: "luciexe"
      }
      properties:
        '{'
        '  "$build/chromium_tests_builder_config": {'
        '    "builder_config": {'
        '      "additional_exclusions": ['
        '        "infra/config/generated/builders/try/angle-cq-android-arm-dbg/gn-args.json"'
        '      ],'
        '      "analyze_names": ['
        '        "angle"'
        '      ],'
        '      "builder_db": {'
        '        "entries": ['
        '          {'
        '            "builder_id": {'
        '              "bucket": "ci",'
        '              "builder": "angle-android-arm-builder-dbg",'
        '              "project": "angle"'
        '            },'
        '            "builder_spec": {'
        '              "builder_group": "ci",'
        '              "execution_mode": "COMPILE_AND_TEST",'
        '              "legacy_chromium_config": {'
        '                "build_config": "Debug",'
        '                "config": "angle_v2_clang",'
        '                "target_arch": "arm",'
        '                "target_bits": 32,'
        '                "target_platform": "android"'
        '              },'
        '              "legacy_gclient_config": {'
        '                "config": "angle_v2_android"'
        '              }'
        '            }'
        '          }'
        '        ]'
        '      },'
        '      "builder_ids": ['
        '        {'
        '          "bucket": "ci",'
        '          "builder": "angle-android-arm-builder-dbg",'
        '          "project": "angle"'
        '        }'
        '      ],'
        '      "retry_failed_shards": false,'
        '      "retry_without_patch": false'
        '    }'
        '  },'
        '  "$build/flakiness": {'
        '    "check_for_flakiness": true,'
        '    "check_for_flakiness_with_resultdb": true'
        '  },'
        '  "$build/siso": {'
        '    "configs": ['
        '      "builder"'
        '    ],'
        '    "enable_cloud_monitoring": true,'
        '    "enable_cloud_trace": true,'
        '    "experiments": [],'
        '    "profile_mode": "cloud",'
        '    "project": "rbe-chromium-untrusted",'
        '    "remote_jobs": 250'
        '  },'
        '  "builder_group": "try",'
        '  "cq": "required",'
        '  "recipe": "angle_v2/angle_v2_trybot"'
        '}'
      build_numbers: YES
      service_account: "angle-try-builder@chops-service-accounts.iam.gserviceaccount.com"
      experiments {
        key: "chromium_swarming.expose_merge_script_failures"
        value: 100
      }
      resultdb {
        enable: true
        bq_exports {
          project: "chrome-luci-data"
          dataset: "chromium"
          table: "try_test_results"
          test_results {}
        }
        bq_exports {
          project: "chrome-luci-data"
          dataset: "chromium"
          table: "gpu_try_test_results"
          test_results {
            predicate {
              test_id_regexp: "(ninja://(chrome|content)/test:telemetry_gpu_integration_test[^/]*/.+)"
            }
          }
        }
        bq_exports {
          project: "chrome-luci-data"
